listen_addr: "0.0.0.0:18080"
database_driver: "postgres"
database_dsn: "host=db user=root password=123456 dbname=scan_control_plane port=5432 sslmode=disable TimeZone=UTC"
log_level: "info"
agent_token: "my-secret-token"
default_idle_window: "10m"
scheduler_tick: "10s"

event_merge:
  flush_tick: "1s"
  flush_idle: "3s"
  flush_max_wait: "8s"
  flush_batch_size: 256
  max_memory_keys: 10000

worker:
  enabled: true
  execution_mode: "core_task"
  tick: "2s"
  max_concurrent: 2
  max_per_tenant: 2
  max_per_source: 1
  max_large_file: 1
  large_file_threshold_bytes: 104857600
  claim_batch_size: 16
  lease_duration: "45s"
  retry_base_backoff: "10s"
  retry_max_backoff: "5m"
  agent_timeout: "20s"
  command_ack_timeout: "60s"
  command_max_attempts: 6
  agent_offline_timeout: "90s"

parser:
  enabled: false
  endpoint: ""
  timeout: "60s"
  auth_token: ""

core:
  enabled: true
  endpoint: "http://core:8000"
  dataset_id: ""
  user_id: "11111111-1111-1111-1111-111111111111"
  user_name: "scan-control-plane"
  start_mode: "ASYNC"
  auth_token: ""
  timeout: "60s"

metrics:
  enabled: true
  tick: "30s"
